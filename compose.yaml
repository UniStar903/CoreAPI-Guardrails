version: '1.0'

services:
  postgres:
    image: postgres:15
    container_name: postgres-guardrailsDB
    restart: always
    environment:
      - 'POSTGRES_DB=guardrailsDB'
      - 'POSTGRES_USER=${USER}'
      - 'POSTGRES_PASSWORD=${PASS}'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis-guardrailsDB
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: